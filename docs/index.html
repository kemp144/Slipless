<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slipless</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      background: radial-gradient(circle at top, #1a2538 0%, #0e1420 58%, #0a0f18 100%);
      color: #f4f7fb;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    main {
      width: min(760px, calc(100% - 40px));
      padding: 56px 28px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      backdrop-filter: blur(18px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    }
    h1 {
      font-size: clamp(2.3rem, 5vw, 3.8rem);
      margin: 0 0 12px;
    }
    p {
      color: #d6ddea;
      line-height: 1.65;
      max-width: 58ch;
    }
    .links {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 28px;
    }
    a {
      display: inline-block;
      text-decoration: none;
      color: #0c1320;
      background: #f4f7fb;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 600;
    }
    a.secondary {
      background: transparent;
      color: #f4f7fb;
      border: 1px solid rgba(255, 255, 255, 0.16);
    }
  </style>
</head>
<body>
  <main>
    <h1>Slipless</h1>
    <p>Slipless is a private, local-first habit tracker for reducing or quitting one habit at a time.</p>
    <div class="links">
      <a href="privacy-policy.html">Privacy Policy</a>
      <a class="secondary" href="support.html">Support</a>
    </div>
  </main>
</body>
</html>
